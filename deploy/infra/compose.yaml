name: mvpool-infra

# Shared infrastructure for the MVP pool.
# Runs once per server. Each MVP stack connects to these via external networks.

networks:
  edge:
    name: mvpool_edge
    driver: bridge
  data:
    name: mvpool_data
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  registry_data:

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in infra/.env}
      POOL_DOMAIN: ${POOL_DOMAIN:?set POOL_DOMAIN in infra/.env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./sites:/etc/caddy/sites:ro
      - ./registry-auth:/etc/caddy/registry-auth:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:?set POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?set POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 3s
      retries: 10
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c log_min_duration_statement=500

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    networks:
      - data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Self-hosted Docker registry for image-push deploys.
  # Caddy fronts it at registry.${POOL_DOMAIN} with auto TLS + basic auth.
  # The registry itself only listens on 127.0.0.1 — Caddy is the only reachable
  # entry point, and it requires the htpasswd-authenticated user to pass through.
  registry:
    image: registry:2
    restart: unless-stopped
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_HEADERS_X-Content-Type-Options: "[nosniff]"
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - edge
    ports:
      - "127.0.0.1:5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 3s
      retries: 3
