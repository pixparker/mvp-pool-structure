server {
	listen 80 default_server;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Prototype mode: no caching anywhere — every refresh fetches fresh
	# bytes. Useful while iterating on a design where filenames can't be
	# hash-versioned. Switch to nginx-immutable.conf for production.
	add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
	add_header Pragma "no-cache";
	add_header Expires "0";

	location / {
		try_files $uri $uri/ /index.html;
	}
}
